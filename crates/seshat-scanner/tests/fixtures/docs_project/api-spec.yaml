openapi: '3.0.0'
info:
  title: Seshat API
  description: Knowledge graph management API
  version: '0.1.0'
paths:
  /projects:
    get:
      summary: List all projects
      operationId: listProjects
      tags:
        - projects
      responses:
        '200':
          description: A list of projects
    post:
      summary: Create a new project
      operationId: createProject
      tags:
        - projects
      responses:
        '201':
          description: Project created
        '400':
          description: Invalid input
  /projects/{projectId}:
    get:
      summary: Get project details
      operationId: getProject
      tags:
        - projects
      responses:
        '200':
          description: Project details
        '404':
          description: Project not found
    delete:
      summary: Delete a project
      operationId: deleteProject
      tags:
        - projects
      responses:
        '204':
          description: Project deleted
        '404':
          description: Project not found
  /projects/{projectId}/scan:
    post:
      summary: Trigger a project scan
      operationId: triggerScan
      tags:
        - scanning
      responses:
        '202':
          description: Scan started
  /nodes:
    get:
      summary: Query knowledge nodes
      operationId: queryNodes
      tags:
        - knowledge
      responses:
        '200':
          description: Matching nodes
components:
  schemas:
    Project:
      type: object
      description: A scanned project
    KnowledgeNode:
      type: object
      description: A node in the knowledge graph
    ScanResult:
      type: object
      description: Result of a project scan
