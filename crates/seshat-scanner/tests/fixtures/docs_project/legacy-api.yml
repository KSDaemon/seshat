swagger: '2.0'
info:
  title: Legacy API
  version: '1.0'
paths:
  /users:
    get:
      summary: List users
      responses:
        '200':
          description: OK
  /users/{id}:
    get:
      summary: Get user by ID
      responses:
        '200':
          description: User found
        '404':
          description: Not found
definitions:
  User:
    type: object
    description: A user in the legacy system
  Session:
    type: object
    description: An active user session
