# release-plz configuration
# Reference: https://release-plz.dev/docs/config
#
# This file does two things:
#
# 1. Customize CHANGELOG grouping so `chore(deps)` lands in its own
#    "Dependencies" section instead of the catch-all "Other" bucket.
#
# 2. Collapse 10 per-crate GitHub Releases AND per-crate git tags into
#    a *single* workspace-wide pair. By default, release-plz publishes
#    each crate as its own GitHub Release plus an `<crate>-v<version>`
#    git tag — which floods the Releases page and litters the tag list
#    with noise that nothing actually consumes.
#
#    Workspace-wide we disable both per-crate GitHub Releases AND per-
#    crate git tags. The `seshat-bin` crate is then opted back in with
#    a custom tag/release name — `v<version>` — so we get exactly one
#    human-readable release and one tag per workspace bump, and
#    `release.yml` can latch onto the `v*` tag.

[workspace]
# Suppress per-crate GitHub Releases AND per-crate git tags entirely.
# Single workspace tag is created by the `seshat-bin` override below.
git_release_enable = false
git_tag_enable     = false

[[package]]
name = "seshat-bin"
# Single workspace-level tag and GitHub Release live here. Tag is
# `v<version>` (not `seshat-bin-v<version>`) so it matches the
# `tags: ['v*']` trigger in release.yml — that's how the cross-platform
# binary build pipeline kicks off automatically after each release.
# Both enables are explicit because workspace-level defaults above are
# `false`, and `[[package]]` overrides them.
git_release_enable = true
git_tag_enable     = true
git_tag_name       = "v{{ version }}"
git_release_name   = "Seshat v{{ version }}"

[changelog]
# Strip user-story identifiers ("US-001", "[US-001]", optionally
# followed by " - " or " — ") from the subject line BEFORE parsers
# and the changelog template see it. We use these in commit subjects
# to link to the PRD, but in a rendered changelog they read as noise
# ("US-007 - Documentation, ADR, and CHANGELOG entry" → "Documentation,
# ADR, and CHANGELOG entry"). Applied right after the conventional
# prefix (`feat: `, `fix(scope): `, …) so a `feat: US-007 - foo`
# subject becomes `feat: foo`.
commit_preprocessors = [
    { pattern = '(?m)^([a-z]+(?:\([^)]+\))?:\s*)\[?US-\d+\]?\s*[-—]?\s*', replace = "$1" },
]

# Order matters: parsers are matched top-to-bottom, first hit wins.
# `chore(deps)` is checked BEFORE the generic `chore` skip rule, so
# dependency bumps stay in the changelog while other chore/style noise
# is filtered out. Numeric prefixes (`<!-- N -->`) drive section order
# in the rendered output without leaking into headings.
commit_parsers = [
    { message = "^feat",              group = "<!-- 0 -->Features" },
    { message = "^fix",               group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf",              group = "<!-- 2 -->Performance" },
    { message = "^chore\\(deps\\)",   group = "<!-- 3 -->Dependencies" },
    { message = "^refactor",          group = "<!-- 4 -->Refactor" },
    { message = "^docs",              group = "<!-- 5 -->Documentation" },
    { message = "^test",              group = "<!-- 6 -->Tests" },
    { message = "^ci",                group = "<!-- 7 -->CI" },
    { message = "^build",             group = "<!-- 8 -->Build" },
    { message = "^revert",            group = "<!-- 9 -->Revert" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore",             skip = true },
    { message = "^style",             skip = true },
]
