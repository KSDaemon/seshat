name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  generate-completions:
    name: Generate shell completions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: completions

      - name: Build seshat (native, for running)
        run: cargo build --release -p seshat-bin

      - name: Generate completion scripts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p completions

          # Generate each shell's script. `set -e` aborts on a failed
          # invocation, but the `>` redirect creates the file *before*
          # the binary runs — so a panic mid-generation leaves a
          # zero-byte file on disk. Validate non-empty after each
          # invocation before moving on.
          gen() {
            local shell="$1"
            local out="$2"
            ./target/release/seshat completions "${shell}" > "${out}"
            if [[ ! -s "${out}" ]]; then
              echo "::error::Generated ${out} for shell=${shell} is empty"
              exit 1
            fi
          }

          gen bash       completions/seshat.bash
          gen zsh        completions/_seshat
          gen fish       completions/seshat.fish
          gen powershell completions/_seshat.ps1
          gen elvish     completions/seshat.elv

      - name: Package standalone completions tarball
        shell: bash
        run: |
          set -euo pipefail
          # Explicit file list — never `tar -C completions .` because
          # any stray dotfile (`.DS_Store`, editor swap files) would
          # ride along into the published tarball.
          tar czf seshat-completions.tar.gz -C completions \
            seshat.bash _seshat seshat.fish _seshat.ps1 seshat.elv

      - name: Upload completions directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: completions-dir
          path: completions/

      - name: Upload standalone completions tarball
        uses: actions/upload-artifact@v4
        with:
          name: completions-tarball
          path: seshat-completions.tar.gz

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: generate-completions
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p seshat-bin

      - name: Download completion scripts
        uses: actions/download-artifact@v4
        with:
          name: completions-dir
          path: completions/

      - name: Package binary
        shell: bash
        run: |
          BIN_NAME="seshat"
          TARGET_TRIPLE="${{ matrix.target }}"
          ARCHIVE_NAME="seshat-${TARGET_TRIPLE}-${GITHUB_REF_NAME}"

          mkdir -p "dist/${ARCHIVE_NAME}"
          if [[ "${TARGET_TRIPLE}" == *windows* ]]; then
            cp "target/${TARGET_TRIPLE}/release/${BIN_NAME}.exe" "dist/${ARCHIVE_NAME}/"
          else
            cp "target/${TARGET_TRIPLE}/release/${BIN_NAME}" "dist/${ARCHIVE_NAME}/"
          fi
          cp LICENSE README.md "dist/${ARCHIVE_NAME}/" 2>/dev/null || true

          # Bundle pre-generated completion scripts so package managers
          # (Homebrew, apt, etc.) can install them without running the binary.
          cp -R completions "dist/${ARCHIVE_NAME}/completions"

          cd dist
          if [[ "${TARGET_TRIPLE}" == *windows* ]]; then
            7z a "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seshat-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  generate-checksums:
    name: Generate SHA256 checksums
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      # Download only the per-platform binary archives and the standalone
      # completions tarball into a flat directory. We deliberately skip
      # `completions-dir` (the raw bash/zsh/... files) — those are an
      # inter-job artifact, not a release asset, and dropping them in
      # `artifacts/` would pollute sha256sums.txt and risk a future
      # glob change accidentally publishing them.
      - name: Download platform archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: seshat-*
          merge-multiple: true
      - name: Download standalone completions tarball
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: completions-tarball

      - name: Generate sha256sums.txt
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          # Hash exactly the per-platform release archives plus the
          # standalone completions tarball — never glob `*.tar.gz` so
          # an unexpected file in the dir can't sneak into checksums.
          sha256sum \
            seshat-*-apple-darwin.tar.gz \
            seshat-*-unknown-linux-gnu.tar.gz \
            seshat-*-pc-windows-msvc.zip \
            seshat-completions.tar.gz \
            > sha256sums.txt
          cat sha256sums.txt

      - name: Upload sha256sums.txt
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums
          path: artifacts/sha256sums.txt

  upload-release:
    name: Upload Release Assets
    needs: generate-checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Mirror generate-checksums: pull only the artifacts that should
      # become public release assets. `completions-dir` (raw shell files)
      # stays out so an over-broad upload glob can't leak loose files.
      - name: Download platform archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: seshat-*
          merge-multiple: true
      - name: Download standalone completions tarball
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: completions-tarball
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: sha256sums

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/seshat-*-apple-darwin.tar.gz
            artifacts/seshat-*-unknown-linux-gnu.tar.gz
            artifacts/seshat-*-pc-windows-msvc.zip
            artifacts/seshat-completions.tar.gz
            artifacts/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
