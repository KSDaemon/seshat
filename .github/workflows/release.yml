name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p seshat-bin

      - name: Package binary
        shell: bash
        run: |
          BIN_NAME="seshat"
          TARGET_TRIPLE="${{ matrix.target }}"
          ARCHIVE_NAME="seshat-${TARGET_TRIPLE}"

          mkdir -p "dist/${ARCHIVE_NAME}"
          if [[ "${TARGET_TRIPLE}" == *windows* ]]; then
            cp "target/${TARGET_TRIPLE}/release/${BIN_NAME}.exe" "dist/${ARCHIVE_NAME}/"
          else
            cp "target/${TARGET_TRIPLE}/release/${BIN_NAME}" "dist/${ARCHIVE_NAME}/"
          fi
          cp LICENSE README.md "dist/${ARCHIVE_NAME}/" 2>/dev/null || true

          cd dist
          if [[ "${TARGET_TRIPLE}" == *windows* ]]; then
            7z a "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seshat-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  generate-checksums:
    name: Generate SHA256 checksums
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate sha256sums.txt
        run: |
          sha256sum artifacts/*.tar.gz artifacts/*.zip > sha256sums.txt
          cat sha256sums.txt

      - name: Upload sha256sums.txt
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums
          path: sha256sums.txt

  upload-release:
    name: Upload Release Assets
    needs: generate-checksums
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
