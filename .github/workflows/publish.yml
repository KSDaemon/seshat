name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (not the default GITHUB_TOKEN) so that tags pushed
          # below trigger downstream workflows. GitHub deliberately skips
          # workflow runs for events caused by GITHUB_TOKEN to prevent
          # recursive loops — that's why `release.yml` stopped firing on
          # the v* tag once we switched to release-plz.
          token: ${{ secrets.SESHAT_RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # Same PAT as the checkout `token:` — release-plz uses this for
          # GitHub API calls (creating the Release, pushing tags). Using
          # GITHUB_TOKEN here would prevent the tag push from triggering
          # release.yml; see the comment on the checkout step above.
          GITHUB_TOKEN: ${{ secrets.SESHAT_RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
